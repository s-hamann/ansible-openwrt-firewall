---
- name: 'Restart firewall'
  community.openwrt.service:
    name: firewall
    state: restarted
  when: "not ansible_facts['is_chroot']"
  listen: _openwrt_restart_firewall

- name: 'Restart banIP'
  community.openwrt.service:
    name: banip
    state: restarted
  when: "not ansible_facts['is_chroot']"
  listen: _openwrt_restart_banip

- name: 'Restart cron'
  community.openwrt.service:
    name: cron
    state: restarted
  when: "not ansible_facts['is_chroot']"
  listen: _openwrt_restart_cron
